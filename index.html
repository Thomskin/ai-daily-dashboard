<title>AI HOT 每日晨报 — 2026年6月24日</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0e14; --card-bg: #141820; --border: #222832;
    --text: #c8ccd4; --text-secondary: #8b8fa3; --text-muted: #5a5e6e;
    --section-1: #6c9cf5; --section-2: #f59e6c; --section-3: #6cf59e;
    --section-4: #f5e26c; --section-5: #c56cf5;
    --radius: 12px; --radius-sm: 8px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6;
    min-height: 100vh;
  }

  /* Hero */
  .hero {
    text-align: center; padding: 60px 20px 40px;
    background: linear-gradient(180deg, rgba(108,156,245,0.08) 0%, transparent 100%);
    border-bottom: 1px solid var(--border);
  }
  .hero h1 {
    font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 800;
    background: linear-gradient(135deg, #6c9cf5, #c56cf5);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 8px;
  }
  .hero .date { font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 4px; }
  .hero .window { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 20px; }
  .hero .stats {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 16px;
  }
  .hero .stat {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 8px 16px; font-size: 0.9rem; display: flex; align-items: center; gap: 6px;
  }
  .hero .stat-num { font-weight: 700; font-size: 1.1rem; }
  .hero .stat-total { border-color: #6c9cf5; }
  .hero .stat-total .stat-num { color: #6c9cf5; }
  .stat-color-1 .stat-num { color: var(--section-1); }
  .stat-color-2 .stat-num { color: var(--section-2); }
  .stat-color-3 .stat-num { color: var(--section-3); }
  .stat-color-4 .stat-num { color: var(--section-4); }
  .stat-color-5 .stat-num { color: var(--section-5); }

  /* Nav */
  .nav-wrap {
    position: sticky; top: 0; z-index: 100;
    background: rgba(11,14,20,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .nav {
    display: flex; justify-content: center; flex-wrap: wrap; gap: 4px;
    padding: 10px 20px; max-width: 1000px; margin: 0 auto;
  }
  .nav a {
    text-decoration: none; color: var(--text-secondary); font-size: 0.85rem;
    padding: 6px 14px; border-radius: 20px; transition: all 0.2s;
    white-space: nowrap;
  }
  .nav a:hover { background: rgba(255,255,255,0.05); color: #fff; }
  .nav a.active { background: rgba(108,156,245,0.15); color: #6c9cf5; }

  /* Content */
  .content { max-width: 1200px; margin: 0 auto; padding: 30px 20px 40px; }
  .section { margin-bottom: 40px; }
  .section-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    padding-bottom: 10px; border-bottom: 1px solid var(--border);
  }
  .section-header h2 { font-size: 1.3rem; font-weight: 700; }
  .section-header .badge {
    font-size: 0.8rem; padding: 3px 10px; border-radius: 20px;
    background: rgba(255,255,255,0.05); color: var(--text-muted);
  }
  .s1 h2 { color: var(--section-1); } .s1 .card-num { background: var(--section-1); }
  .s2 h2 { color: var(--section-2); } .s2 .card-num { background: var(--section-2); }
  .s3 h2 { color: var(--section-3); } .s3 .card-num { background: var(--section-3); }
  .s4 h2 { color: var(--section-4); } .s4 .card-num { background: var(--section-4); }
  .s5 h2 { color: var(--section-5); } .s5 .card-num { background: var(--section-5); }

  /* Cards */
  .cards {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
    transition: border-color 0.2s, transform 0.15s;
    display: flex; flex-direction: column;
  }
  .card:hover { border-color: #3a3f4a; transform: translateY(-2px); }
  .card-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
  .card-num {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 700; color: #fff; margin-top: 2px;
  }
  .card-title { font-size: 0.95rem; font-weight: 600; color: #e0e3ea; line-height: 1.5; }
  .card-source {
    display: inline-block; font-size: 0.7rem; color: var(--text-muted);
    background: rgba(255,255,255,0.04); padding: 3px 10px;
    border-radius: 20px; margin: 8px 0; width: fit-content;
  }
  .card-summary { font-size: 0.83rem; color: var(--text-secondary); line-height: 1.6; flex: 1; margin-bottom: 12px; }
  .card-link {
    text-decoration: none; color: var(--text-muted); font-size: 0.78rem;
    display: inline-flex; align-items: center; gap: 4px; margin-top: auto;
    transition: color 0.2s;
  }
  .card-link:hover { color: var(--section-1); }
  .card-link svg { width: 14px; height: 14px; opacity: 0.6; }

  /* Footer */
  .footer {
    text-align: center; padding: 30px 20px; border-top: 1px solid var(--border);
    color: var(--text-muted); font-size: 0.82rem; line-height: 1.8;
  }
  .footer a { color: var(--text-secondary); text-decoration: none; }
  .footer a:hover { color: var(--section-1); }

  /* Animation for numbers */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card { animation: fadeUp 0.4s ease both; }

  @media (max-width: 640px) {
    .hero { padding: 40px 16px 24px; }
    .hero .stats { gap: 6px; }
    .hero .stat { padding: 6px 12px; font-size: 0.8rem; }
    .cards { grid-template-columns: 1fr; }
    .nav { justify-content: flex-start; overflow-x: auto; padding: 8px 12px; }
    .nav a { font-size: 0.78rem; padding: 5px 10px; }
    .content { padding: 20px 12px 30px; }
  }
</style>

    items: [

      {title:'五眼联盟警告：AI网络威胁数月内将影响普通用户',source:'Artificial Intelligence News（RSS）',url:'https://www.artificialintelligence-news.com/news/five-eyes-warning-ai-cyber-threats',summary:'五眼联盟警告AI模型将降低攻击门槛，超个性化钓鱼诈骗已在亚太蔓延。'},

      {title:'Omio 如何构建对话式旅行的未来',source:'OpenAI：官网动态',url:'https://openai.com/index/omio',summary:'Omio利用OpenAI技术构建对话式旅行体验，加速向AI原生公司转型。'}

  },
  {

    ]
  },

      {title:'Meta 如何为 AI 眼镜设计超窄钢壳电池',source:'Meta Engineering Blog（RSS）',url:'https://engineering.fb.com/2026/06/23/production-engineering/how-meta-built-ultra-narrow-batteries-for-ai-glasses-meta-tech-podcast',summary:'7mm超窄钢壳电池，容量160mAh→210mAh，续航翻倍来自系统级效率优化。'},
      {title:'Claude Tag 的 Agent Identity 访问模型',source:'Claude：Blog（网页）',url:'https://claude.com/blog/agent-identity-access-model',summary:'Agent Identity让Claude在共享频道以独立身份工作，频道级权限隔离。'},
      {title:'GPT-5 帮助免疫学家 Derya Unutmaz 解开三年未解之谜',source:'OpenAI：官网动态',url:'https://openai.com/index/gpt-5-immunology-mystery',summary:'GPT-5 Pro帮助免疫学家解开三年T细胞谜团，助力癌症与自身免疫研究。'}
    ]

];

// Compute totals
const counts = SECTIONS.map(s => s.items.length);
const total = counts.reduce((a, b) => a + b, 0);

// Render stats
const statsDiv = document.getElementById('stats');
const statLabels = ['总精选', '模型发布/更新', '产品发布/更新', '行业动态', '论文研究', '技巧与观点'];
const statClasses = ['stat-total', 'stat-color-1', 'stat-color-2', 'stat-color-3', 'stat-color-4', 'stat-color-5'];
const statNums = [total, ...counts];
statsDiv.innerHTML = statLabels.map((l, i) =>
  `<div class="stat ${statClasses[i]}"><span>${l}</span><span class="stat-num" data-target="${statNums[i]}">0</span></div>`
).join('');

// Render nav
const navDiv = document.getElementById('nav');
navDiv.innerHTML = SECTIONS.map(s =>
  `<a href="#${s.id}">${s.label}</a>`
).join('');

// Render sections & cards
const contentDiv = document.getElementById('content');
let globalIndex = 0;

SECTIONS.forEach((section) => {
  const secDiv = document.createElement('div');
  secDiv.className = `section ${section.cssClass}`;
  secDiv.id = section.id;

  secDiv.innerHTML = `
    <div class="section-header">
      <h2>${section.label}</h2>
      <span class="badge">${section.items.length} 条</span>
    </div>
    <div class="cards"></div>
  `;

  const cardsDiv = secDiv.querySelector('.cards');

  section.items.forEach((item, i) => {
    globalIndex++;
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${globalIndex * 0.03}s`;
    card.innerHTML = `
      <div class="card-header">
        <span class="card-num">${String(globalIndex).padStart(2, '0')}</span>
        <span class="card-title">${item.title}</span>
      </div>
      <span class="card-source">${item.source}</span>
      <p class="card-summary">${item.summary}</p>
      <a class="card-link" href="${item.url}" target="_blank" rel="noopener noreferrer">
        阅读原文
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
          <polyline points="15 3 21 3 21 9"></polyline>
          <line x1="10" y1="14" x2="21" y2="3"></line>
        </svg>
      </a>
    `;
    cardsDiv.appendChild(card);
  });

  contentDiv.appendChild(secDiv);
});

// Footer total
document.getElementById('footer-total').textContent = total;
document.getElementById('gen-time').textContent = '2026年6月24日 10:41（北京时间）';

// Number animation
function animateNumbers() {
  document.querySelectorAll('.stat-num[data-target]').forEach(el => {
    const target = parseInt(el.dataset.target);
    if (el._animated) return;
    el._animated = true;
    let current = 0;
    const duration = 800;
    const step = Math.max(1, Math.ceil(target / (duration / 16)));
    const timer = setInterval(() => {
      current = Math.min(current + step, target);
      el.textContent = current;
      if (current >= target) clearInterval(timer);
    }, 16);
  });
}
animateNumbers();

// IntersectionObserver for sticky nav highlight
const navLinks = document.querySelectorAll('.nav a');
const sectionEls = SECTIONS.map(s => document.getElementById(s.id));

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const id = entry.target.id;
      navLinks.forEach(a => {
        a.classList.toggle('active', a.getAttribute('href') === '#' + id);
      });
    }
  });
}, { threshold: 0.3, rootMargin: '-80px 0px -60% 0px' });

sectionEls.forEach(el => observer.observe(el));
</script>
